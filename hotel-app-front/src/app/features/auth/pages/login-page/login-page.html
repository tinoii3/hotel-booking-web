<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h3>ยินดีต้อนรับ</h3>
      <p>เข้าสู่ระบบเพื่อทำรายการจองที่พักของคุณ</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group mb-3">
        <label>ชื่อผู้ใช้</label>

        <input
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="กรุณากรอกชื่อผู้ใช้"
        />

        @if (loginForm.get('username')?.touched && loginForm.get('username')?.invalid) {
          <div class="text-danger mt-1">กรุณากรอกชื่อผู้ใช้</div>
        }
      </div>

      <div class="form-group mb-4">
        <label>รหัสผ่าน</label>

        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="กรุณากรอกรหัสผ่าน"
        />

        @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
          <div class="text-danger mt-1">กรุณากรอกรหัสผ่าน</div>
        }
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        เข้าสู่ระบบ
      </button>
    </form>

    <div class="auth-footer">
      <span>ยังไม่มีบัญชีใช่ไหม?</span>
      <a routerLink="/auth/register" class="text-decoration-underline">สมัครสมาชิก</a>
    </div>
  </div>
</div>
