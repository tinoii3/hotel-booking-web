<div class="bg-light min-vh-100 py-4">
  <div class="container" style="max-width: 1100px">
    <div class="bg-white border border-dark-subtle rounded-3 p-4 shadow-sm">
      <div class="payment-layout">
        <!-- LEFT SIDE -->
        <div class="left">
          <div class="section">
            <detail-component (formChange)="onDetailChange($event)"></detail-component>
          </div>

          <div class="section">
            <payment-method-component
              (formChange)="onPaymentChange($event)"
            ></payment-method-component>
          </div>

          <div class="section">
            <button
              type="button"
              class="btn btn-dark rounded-3 fw-semibold"
              style="width: 100%; margin: 0 auto; display: block"
              (click)="onSubmitPayment()"
            >
              ชำระเงิน
            </button>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
          <detail-reservation-component
            (bookingLoaded)="onBookingChange($event)"
          ></detail-reservation-component>
        </div>
      </div>
    </div>
  </div>
</div>
