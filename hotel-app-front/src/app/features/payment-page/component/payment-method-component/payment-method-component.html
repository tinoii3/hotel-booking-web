<h3 class="fw-bold mb-4">ชำระเงิน</h3>
<form>
  <div class="mb-3">
    <label for="cardNumber" class="form-label fw-semibold">หมายเลขบัตรเครดิต</label>
    <input
      type="text"
      class="form-control rounded-3"
      id="cardNumber"
      placeholder="1234 5678 9012 3456"
    />
  </div>
  <div class="mb-3">
    <label for="expiryDate" class="form-label fw-semibold">วันหมดอายุ</label>
    <input type="text" class="form-control rounded-3" id="expiryDate" placeholder="MM/YY" />
  </div>
  <div class="mb-3">
    <label for="cvv" class="form-label fw-semibold">CVV</label>
    <input type="text" class="form-control rounded-3" id="cvv" placeholder="123" />
  </div>
  <button type="submit" class="btn btn-dark w-100 rounded-3 fw-semibold px-4">ชำระเงิน</button>
</form>
