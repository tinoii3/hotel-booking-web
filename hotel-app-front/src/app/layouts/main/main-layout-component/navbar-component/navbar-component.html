<nav class="navbar navbar-expand-lg px-4 shadow-sm">
  <a class="navbar-brand fw-bold" routerLink="/hotel/home">Hotel</a>

  <div class="ms-auto d-flex align-items-center gap-2">
    <div class="d-flex align-items-center gap-2 me-4">
      <a
        routerLink="/hotel/home"
        routerLinkActive="fw-bold text-decoration-underline"
        class="nav-link fw-semibold px-2"
      >
        Home
      </a>

      <a
        routerLink="/hotel/roombooking"
        routerLinkActive="fw-bold text-decoration-underline"
        class="nav-link fw-semibold px-2"
      >
        Booking
      </a>

      <a
        routerLink="/hotel/payment"
        routerLinkActive="fw-bold text-decoration-underline"
        class="nav-link fw-semibold px-2"
      >
        Payment
      </a>
    </div>

    @if (isLoggedIn()) {
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-light fw-semibold px-4" (click)="logout()">Logout</button>
      </div>
    } @else {
      <div class="d-flex gap-3">
        <a routerLink="/auth/login" class="btn btn-primary fw-semibold px-4"> Login </a>

        <a routerLink="/auth/register" class="btn btn-outline-light fw-semibold px-4"> Register </a>
      </div>
    }
  </div>
</nav>
