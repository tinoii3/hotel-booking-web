<nav class="navbar navbar-expand-lg px-3 shadow-sm">
  <a class="navbar-brand fw-bold" routerLink="/">Hotel</a>

  <div class="ms-auto">
    @if (auth.isLoggedIn()) {
      <button class="btn btn-outline-light" (click)="logout()">Logout</button>
    } @else {
      <div style="display: flex; gap: 20px;">
        <div>
          <a routerLink="/auth/login" class="btn btn-outline-light fw-semibold" style="width: 100px;"> Login </a>
        </div>
        <div>
          <a routerLink="/auth/register" class="btn bg-white text-primary fw-semibold shadow-sm" style="width: 100px;"> Register </a>
        </div>
      </div>
    }
  </div>
</nav>
